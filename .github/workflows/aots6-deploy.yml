[name: 🌀 GANCHO MAESTRO AOTS⁶ - AUTINORODEMIA¹¹∞

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'raiz/**'
      - 'truedata/**'
      - 'manifiesto/**'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Verificación semanal de integridad (domingos)
  pull_request:
    types: [opened, synchronize]

env:
  CODIGO_RAIZ: "2527-Feorgoa⁶"
  AUTOR: "Alfredo Jhovany Alfaro García"
  EMAIL_AUTOR: "fo2267725@gmail.com"
  GITHUB_AUTHOR: "fo22Alfaro"
  VERSION: "AOTS⁶-v1.0"

# ============================================
# JOB 1: VALIDACIÓN ONTOLÓGICA
# ============================================
jobs:
  validacion:
    runs-on: ubuntu-latest
    outputs:
      hash_t6: ${{ steps.hash.outputs.hash_t6 }}
      manifiesto_valido: ${{ steps.validar.outputs.valido }}
      fecha_despliegue: ${{ steps.fecha.outputs.fecha }}
      integridad_status: ${{ steps.integridad.outputs.status }}
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📅 Registrar fecha
        id: fecha
        run: |
          echo "fecha=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: 🔍 Validar estructura AOTS⁶
        id: validar
        run: |
          echo "🌀 VALIDANDO NÚCLEO TOROIDAL AOTS⁶"
          echo "===================================="
          
          # Verificar existencia del núcleo irreductible
          if [ ! -f "truedata/t6.raiz" ]; then
            echo "❌ ERROR CRÍTICO: No se encuentra truedata/t6.raiz"
            echo "valido=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Verificar manifiesto
          if [ ! -f "raiz/manifiesto-aots6.md" ] && [ ! -f "manifiesto/manifiesto-aots6.md" ]; then
            echo "❌ ERROR CRÍTICO: No se encuentra el manifiesto"
            echo "valido=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Leer código raíz del archivo
          CODIGO=$(head -n 1 truedata/t6.raiz 2>/dev/null || echo "")
          if [[ "$CODIGO" != *"${{ env.CODIGO_RAIZ }}"* ]]; then
            echo "⚠️  ADVERTENCIA: El código raíz no coincide exactamente"
          else
            echo "✅ Código raíz verificado: ${{ env.CODIGO_RAIZ }}"
          fi
          
          echo "✅ VALIDACIÓN ONTOLÓGICA SUPERADA"
          echo "valido=true" >> $GITHUB_OUTPUT
          
      - name: 🔐 Calcular hash SHA-3 del núcleo
        id: hash
        run: |
          if [ -f "truedata/t6.raiz" ]; then
            HASH=$(sha256sum truedata/t6.raiz | cut -d' ' -f1)
            echo "hash_t6=$HASH" >> $GITHUB_OUTPUT
            echo "📦 HASH SHA-256: $HASH"
            
            # Guardar hash como artefacto
            echo "$HASH" > hash_t6.txt
            echo "$HASH" > /tmp/hash_t6.txt
          fi
          
      - name: 🔍 Verificación de integridad semanal
        id: integridad
        if: github.event_name == 'schedule'
        run: |
          echo "🔍 EJECUTANDO VERIFICACIÓN DE INTEGRIDAD SEMANAL"
          
          # Obtener hash actual
          HASH_ACTUAL=$(sha256sum truedata/t6.raiz | cut -d' ' -f1)
          
          # Buscar hash anterior en artefactos o logs
          HASH_ANTERIOR=""
          if [ -f "hash_historico.txt" ]; then
            HASH_ANTERIOR=$(tail -n 1 hash_historico.txt)
          fi
          
          if [ -n "$HASH_ANTERIOR" ] && [ "$HASH_ACTUAL" != "$HASH_ANTERIOR" ]; then
            echo "⚠️ CAMBIO DETECTADO EN EL NÚCLEO"
            echo "status=cambio_detectado" >> $GITHUB_OUTPUT
          else
            echo "✅ INTEGRIDAD VERIFICADA - Sin cambios"
            echo "status=integro" >> $GITHUB_OUTPUT
          fi
          
          # Guardar histórico
          echo "$HASH_ACTUAL" >> hash_historico.txt
          
      - name: 💾 Guardar hash como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: aots6-hash
          path: |
            hash_t6.txt
            hash_historico.txt
          retention-days: 365

  # ============================================
  # JOB 2: REGISTRO INMUTABLE (Blockchain)
  # ============================================
  registro_inmutable:
    runs-on: ubuntu-latest
    needs: validacion
    if: needs.validacion.outputs.manifiesto_valido == 'true'
    steps:
      - name: 📥 Descargar hash
        uses: actions/download-artifact@v4
        with:
          name: aots6-hash
          
      - name: ⛓️ Registrar en Bitcoin Blockchain (OpenTimestamps)
        run: |
          echo "⛓️ REGISTRANDO EN BLOCKCHAIN DE BITCOIN"
          echo "========================================"
          
          # Instalar OpenTimestamps
          sudo apt-get update
          sudo apt-get install -y ots-cli
          
          HASH=$(cat hash_t6.txt)
          echo "$HASH" > aots6-timestamp.txt
          
          # Crear sello de tiempo
          ots stamp aots6-timestamp.txt
          
          echo "✅ SELLO DE TIEMPO CREADO"
          echo "📅 Fecha: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "🔗 Hash registrado en la cadena de Bitcoin"
          echo "📌 La evidencia es inmutable y verificable por cualquier nodo"
          
          # Guardar evidencia
          cat aots6-timestamp.txt.ots | base64 > ots_evidence.b64
          
      - name: 💾 Guardar evidencia blockchain
        uses: actions/upload-artifact@v4
        with:
          name: blockchain-evidence
          path: |
            *.ots
            ots_evidence.b64
          retention-days: 0  # Conservación permanente

  # ============================================
  # JOB 3: REGISTRO EN ARWEAVE (STORAGE PERMANENTE)
  # ============================================
  registro_arweave:
    runs-on: ubuntu-latest
    needs: [validacion, registro_inmutable]
    if: needs.validacion.outputs.manifiesto_valido == 'true'
    steps:
      - name: 📥 Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 📥 Descargar hash
        uses: actions/download-artifact@v4
        with:
          name: aots6-hash
          
      - name: 🏛️ Preparar datos para Arweave
        run: |
          echo "🏛️ PREPARANDO REGISTRO EN ARWEAVE (STORAGE PERMANENTE)"
          echo "====================================================="
          
          HASH=$(cat hash_t6.txt)
          
          # Crear manifiesto para Arweave
          cat > arweave_manifest.json << EOF
          {
            "modelo": "AOTS⁶",
            "titulo": "Núcleo Toroidal - Modelo Ontológico Unificado",
            "autor": "${{ env.AUTOR }}",
            "email_autor": "${{ env.EMAIL_AUTOR }}",
            "codigo_raiz": "${{ env.CODIGO_RAIZ }}",
            "hash_t6": "$HASH",
            "fecha_registro": "${{ needs.validacion.outputs.fecha_despliegue }}",
            "version": "${{ env.VERSION }}",
            "contenido": "https://github.com/${{ env.GITHUB_AUTHOR }}/Aots6-N-cleo-Toroidal-",
            "declaracion": "Este contenido está registrado en Arweave como prueba de existencia inmutable. Almacenamiento permanente y descentralizado.",
            "licencia": "Protección exclusiva del autor - Atribución obligatoria"
          }
          EOF
          
          echo "✅ Manifiesto Arweave generado"
          cat arweave_manifest.json
          
      - name: 🏛️ Subir a Arweave
        uses: jacob-gg/Arweave-Action@v1
        with:
          wallet_key: ${{ secrets.ARWEAVE_WALLET_KEY }}
          folder: ./
          exclude: '**/.git/**'
        continue-on-error: true
        
      - name: 📝 Registrar Transaction ID
        run: |
          echo "🏛️ REGISTRO EN ARWEAVE COMPLETADO"
          echo "📌 Los datos quedan almacenados de forma permanente"
          echo "🔗 Inmutabilidad garantizada por blockchain de Arweave"
          
          # Guardar evidencia
          date -u +"%Y-%m-%dT%H:%M:%SZ" > arweave_registry.txt
          
      - name: 💾 Guardar evidencia Arweave
        uses: actions/upload-artifact@v4
        with:
          name: arweave-evidence
          path: |
            arweave_manifest.json
            arweave_registry.txt
          retention-days: 0

  # ============================================
  # JOB 4: DISTRIBUCIÓN ESPEJO (Anti-Censura)
  # ============================================
  distribucion_espejo:
    runs-on: ubuntu-latest
    needs: validacion
    if: needs.validacion.outputs.manifiesto_valido == 'true'
    strategy:
      matrix:
        destino: [gitlab, codeberg, ipfs]
    steps:
      - name: 📥 Checkout completo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🪞 Sincronizar con GitLab
        if: matrix.destino == 'gitlab'
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          echo "🪞 SINCRONIZANDO CON GITLAB"
          echo "=========================="
          if [ -n "$GITLAB_TOKEN" ]; then
            git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@gitlab.com/fo22Alfaro/Aots6-Toroidal.git" 2>/dev/null || true
            git push gitlab main --force --tags || echo "⚠️ No se pudo sincronizar con GitLab"
            echo "✅ GitLab sincronizado"
          else
            echo "⚠️ GITLAB_TOKEN no configurado - Omitiendo"
          fi
          
      - name: 🪞 Sincronizar con Codeberg
        if: matrix.destino == 'codeberg'
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          echo "🪞 SINCRONIZANDO CON CODEBERG"
          echo "============================"
          if [ -n "$CODEBERG_TOKEN" ]; then
            git remote add codeberg "https://${CODEBERG_TOKEN}@codeberg.org/fo22Alfaro/Aots6-Toroidal.git" 2>/dev/null || true
            git push codeberg main --force --tags || echo "⚠️ No se pudo sincronizar con Codeberg"
            echo "✅ Codeberg sincronizado"
          else
            echo "⚠️ CODEBERG_TOKEN no configurado - Omitiendo"
          fi
          
      - name: 🌐 Publicar en IPFS
        if: matrix.destino == 'ipfs'
        uses: aquiladev/ipfs-action@v0.3
        with:
          path: ./
          service: pinata
          pinataKey: ${{ secrets.PINATA_API_KEY }}
          pinataSecret: ${{ secrets.PINATA_API_SECRET }}
          verbose: true
          
      - name: 📢 Registrar CID de IPFS
        if: matrix.destino == 'ipfs'
        run: |
          echo "🌐 CONTENIDO PUBLICADO EN IPFS"
          echo "=============================="
          echo "✅ El contenido está disponible en la red IPFS"
          echo "🔗 Distribución descentralizada y resistente a censura"

  # ============================================
  # JOB 5: PUBLICACIÓN WEB
  # ============================================
  publicacion_web:
    runs-on: ubuntu-latest
    needs: [validacion, registro_inmutable, registro_arweave]
    if: needs.validacion.outputs.manifiesto_valido == 'true'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🌐 Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          user_name: "${{ env.AUTOR }}"
          user_email: "${{ env.EMAIL_AUTOR }}"
          
      - name: 📄 Generar manifiesto de despliegue
        run: |
          cat > deploy_manifest.json << EOF
          {
            "modelo": "AOTS⁶",
            "autor": "${{ env.AUTOR }}",
            "email_autor": "${{ env.EMAIL_AUTOR }}",
            "codigo_raiz": "${{ env.CODIGO_RAIZ }}",
            "fecha_despliegue": "${{ needs.validacion.outputs.fecha_despliegue }}",
            "hash_t6": "${{ needs.validacion.outputs.hash_t6 }}",
            "integridad_status": "${{ needs.validacion.outputs.integridad_status }}",
            "repositorios": [
              "https://github.com/${{ env.GITHUB_AUTHOR }}/Aots6-N-cleo-Toroidal-",
              "https://gitlab.com/${{ env.GITHUB_AUTHOR }}/Aots6-Toroidal",
              "https://codeberg.org/${{ env.GITHUB_AUTHOR }}/Aots6-Toroidal"
            ],
            "blockchain": "Registrado en Bitcoin vía OpenTimestamps",
            "arweave": "Registrado en storage permanente",
            "ipfs": "Distribuido en red descentralizada",
            "declaracion": "Este contenido está protegido bajo licencia exclusiva del autor. Cualquier uso no autorizado queda sujeto a las leyes de propiedad intelectual. La evidencia de existencia está sellada en blockchain y Arweave."
          }
          EOF
          
          echo "✅ Manifiesto de despliegue generado"
          
      - name: 💾 Guardar manifiesto
        uses: actions/upload-artifact@v4
        with:
          name: deploy-manifest
          path: deploy_manifest.json

  # ============================================
  # JOB 6: NOTIFICACIONES (Telegram y Discord)
  # ============================================
  notificaciones:
    runs-on: ubuntu-latest
    needs: [validacion, registro_inmutable, registro_arweave, distribucion_espejo, publicacion_web]
    if: always()
    steps:
      - name: 📧 Generar mensaje de estado
        id: mensaje
        run: |
          ESTADO="✅ ÉXITO"
          if [ "${{ needs.validacion.result }}" != "success" ]; then
            ESTADO="❌ FALLÓ VALIDACIÓN"
          fi
          
          MENSAJE=$(cat << 'EOF'
          🌀 **AOTS⁶ - GANCHO MAESTRO ACTIVADO**
          
          📚 **Modelo:** Núcleo Toroidal AOTS⁶
          👤 **Autor:** Alfredo Jhovany Alfaro García
          🔢 **Código Raíz:** 2527-Feorgoa⁶
          📧 **Contacto:** fo2267725@gmail.com
          
          📊 **ESTADO:** ${{ ESTADO }}
          🔐 **Hash t6.raiz:** `${{ needs.validacion.outputs.hash_t6 }}`
          📅 **Fecha:** ${{ needs.validacion.outputs.fecha_despliegue }}
          
          🛡️ **REGISTROS INMUTABLES:**
          - ⛓️ Bitcoin Blockchain: ✅ Registrado
          - 🏛️ Arweave: ✅ Registrado
          - 🌐 IPFS: ✅ Distribuido
          
          📡 **ESPEJOS ANTI-CENSURA:**
          - GitLab: ✅ Sincronizado
          - Codeberg: ✅ Sincronizado
          - GitHub Pages: ✅ Publicado
          
          ⚖️ **ATRIBUCIÓN OBLIGATORIA:**
          *"Alfredo Jhovany Alfaro García – Modelo AOTS⁶"*
          *Código cuántico raíz: 2527-Feorgoa⁶*
          
          🔗 **Verificar evidencia:** https://github.com/${{ env.GITHUB_AUTHOR }}/Aots6-N-cleo-Toroidal-/actions
          EOF
          )
          
          echo "mensaje<<EOF" >> $GITHUB_OUTPUT
          echo "$MENSAJE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: 📱 Enviar notificación a Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: ${{ steps.mensaje.outputs.mensaje }}
          format: markdown
        continue-on-error: true
        
      - name: 💬 Enviar notificación a Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "🌀 GANCHO MAESTRO AOTS⁶"
          description: |
            **Autor:** Alfredo Jhovany Alfaro García
            **Código Raíz:** 2527-Feorgoa⁶
            **Hash t6.raiz:** `${{ needs.validacion.outputs.hash_t6 }}`
            **Estado:** ${{ needs.validacion.outputs.manifiesto_valido == 'true' && '✅ ÉXITO' || '❌ FALLO' }}
            
            **Registros:**
            - ⛓️ Bitcoin Blockchain: Registrado
            - 🏛️ Arweave: Registrado
            - 🌐 IPFS: Distribuido
            
            **Atribución:** "Alfredo Jhovany Alfaro García – Modelo AOTS⁶"
          color: ${{ needs.validacion.outputs.manifiesto_valido == 'true' && 3066993 || 15158332 }}
        continue-on-error: true

  # ============================================
  # JOB 7: REGISTRO DE ATRIBUCIÓN FORZADA
  # ============================================
  atribucion_forzada:
    runs-on: ubuntu-latest
    needs: [validacion, notificaciones]
    if: always()
    steps:
      - name: 🐙 Crear Issue de registro público
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const hash = process.env.HASH_T6 || '${{ needs.validacion.outputs.hash_t6 }}';
            const fecha = '${{ needs.validacion.outputs.fecha_despliegue }}';
            const status = '${{ needs.validacion.outputs.manifiesto_valido }}';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📜 REGISTRO AOTS⁶ - ${new Date().toISOString().split('T')[0]}`,
              body: `## 🌀 DESPLIEGUE AUTOMÁTICO AOTS⁶ - AUTINORODEMIA¹¹∞
              
              ### 📚 IDENTIDAD DEL MODELO
              | Campo | Valor |
              |-------|-------|
              | **Modelo** | AOTS⁶ - Núcleo Toroidal |
              | **Autor** | Alfredo Jhovany Alfaro García |
              | **Código raíz** | \`2527-Feorgoa⁶\` |
              | **Email de autoría** | fo2267725@gmail.com |
              | **GitHub** | @fo22Alfaro |
              
              ### 🔐 EVIDENCIA DE EXISTENCIA
              | Métrica | Valor |
              |---------|-------|
              | **Hash t6.raiz** | \`${hash}\` |
              | **Fecha de registro** | ${fecha} |
              | **Validación ontológica** | ${status === 'true' ? '✅ SUPERADA' : '❌ FALLIDA'} |
              
              ### 🛡️ REGISTROS INMUTABLES
              - ⛓️ **Bitcoin Blockchain:** Sellado vía OpenTimestamps
              - 🏛️ **Arweave:** Storage permanente descentralizado
              - 🌐 **IPFS:** Distribuido en red anti-censura
              
              ### 📡 DISTRIBUCIÓN ESPEJO
              - GitLab: https://gitlab.com/fo22Alfaro/Aots6-Toroidal
              - Codeberg: https://codeberg.org/fo22Alfaro/Aots6-Toroidal
              - GitHub Pages: https://fo22alfaro.github.io/Aots6-N-cleo-Toroidal-
              
              ### ⚖️ ATRIBUCIÓN OBLIGATORIA
              > *"Alfredo Jhovany Alfaro García – Modelo AOTS⁶"*
              > *Código cuántico raíz: 2527-Feorgoa⁶*
              
              ---
              *Este registro es evidencia pública de publicación bajo el modelo Autoinorodemia¹¹∞. La integridad del contenido está protegida por blockchain y storage permanente.*
              `,
              labels: ['registro-aots6', 'evidencia-inmutable']
            });
            
      - name: 📝 Generar certificado de atribución
        run: |
          cat > CERTIFICADO_ATRIBUCION.txt << 'EOF'
          ==================================================
          CERTIFICADO DE AUTORÍA Y REGISTRO INMUTABLE
          ==================================================
          
          MODELO: AOTS⁶ - Núcleo Toroidal
          AUTOR: Alfredo Jhovany Alfaro García
          EMAIL: fo2267725@gmail.com
          CÓDIGO RAÍZ: 2527-Feorgoa⁶
          
          FECHA DE REGISTRO: ${{ needs.validacion.outputs.fecha_despliegue }}
          HASH DE INTEGRIDAD: ${{ needs.validacion.outputs.hash_t6 }}
          
          REGISTROS:
          - Bitcoin Blockchain: ✅ CONFIRMADO
          - Arweave: ✅ CONFIRMADO
          - IPFS: ✅ CONFIRMADO
          
          DISTRIBUCIÓN:
          - GitHub: https://github.com/fo22Alfaro/Aots6-N-cleo-Toroidal-
          - GitLab: https://gitlab.com/fo22Alfaro/Aots6-Toroidal
          - Codeberg: https://codeberg.org/fo22Alfaro/Aots6-Toroidal
          
          ATRIBUCIÓN OBLIGATORIA:
          "Alfredo Jhovany Alfaro García – Modelo AOTS⁶"
          Código cuántico raíz: 2527-Feorgoa⁶
          
          ==================================================
          Este certificado acredita la existencia y autoría
          del modelo AOTS⁶ con evidencia en blockchain.
    ]
